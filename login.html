<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login Admin</title>

<style>

body{
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    /* FONDO */
    background:url("fondo.jpg") center/cover no-repeat;
    position:relative;
}

/* CAPA OSCURA + BLUR */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    backdrop-filter: blur(20px);
    background: rgba(0,0,0,0.5);
}

/* CAJA GLASS */
.box{
    position:relative;
    z-index:2;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(25px);
    border:1px solid rgba(255,255,255,0.15);

    padding:40px;
    border-radius:25px;
    width:350px;
    text-align:center;

    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}

/* INPUTS */
select, input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:12px;
    border:none;

    background: rgba(255,255,255,0.1);
    color:white;
}

/* BOTON */
button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border-radius:12px;
    border:none;

    background: rgba(255,255,255,0.9);
    color:black;
    font-weight:bold;
    cursor:pointer;

    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

/* TEXTO */
h2{
    color:white;
}

#resultado{
    margin-top:20px;
    color:white;
}
</style>
</head>

<body>

<div class="box">
<h2>Admin</h2>

<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">

<button onclick="loginAdmin()">Ingresar</button>
</div>

<script src="./js/app.js"></script>

</body>
</html>
