<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cotizar</title>

<style>

body{
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    /* FONDO */
    background:url("fondo.jpg") center/cover no-repeat;
    position:relative;
}

/* CAPA OSCURA + BLUR */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    backdrop-filter: blur(20px);
    background: rgba(0,0,0,0.5);
}

/* CAJA GLASS */
.box{
    position:relative;
    z-index:2;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(25px);
    border:1px solid rgba(255,255,255,0.15);

    padding:40px;
    border-radius:25px;
    width:350px;
    text-align:center;

    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}

/* INPUTS */
select, input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:12px;
    border:none;

    background: rgba(255,255,255,0.1);
    color:white;
}

/* BOTON */
button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border-radius:12px;
    border:none;

    background: rgba(255,255,255,0.9);
    color:black;
    font-weight:bold;
    cursor:pointer;

    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

/* TEXTO */
h2{
    color:white;
}

#resultado{
    margin-top:20px;
    color:white;
}
</style>

</head>

<body>

<div class="box">
<h2>Cotizá tu iPhone</h2>

<input id="nombreCliente" placeholder="Tu nombre">
<input id="telefonoCliente" placeholder="Tu WhatsApp">

<select id="modelo" onchange="cambiarOpciones()">
    <option value="">Modelo</option>
    <option>iPhone 6</option>
    <option>iPhone 7</option>
    <option>iPhone 8</option>
    <option>iPhone X</option>
    <option>iPhone XR</option>
    <option>iPhone 11</option>
    <option>iPhone 12</option>
    <option>iPhone 13</option>
    <option>iPhone 14</option>
</select>

<select id="reparacion" onchange="cambiarOpciones()">
    <option value="">Reparación</option>
    <option>Pantalla</option>
    <option>Batería</option>
    <option>Cámara</option>
    <option>Pin de carga</option>
</select>

<div id="opcionesExtra"></div>

<button onclick="cotizar()">Cotizar</button>

<p id="resultado"></p>

</div>

<script src="./js/app.js"></script>

</body>
</html>
