<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cotizar - NovaFix SF</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:url("fondo.jpg") center/cover no-repeat;
}

/* CAPA OSCURA */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    backdrop-filter: blur(20px);
}

/* CARD */
.card{
    position:relative;
    z-index:2;

    width:380px;
    padding:35px;

    border-radius:25px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(30px);
    border:1px solid rgba(255,255,255,0.15);

    box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

/* TITULO */
h2{
    text-align:center;
    margin-bottom:20px;
}

/* INPUTS */
input, select{
    width:100%;
    padding:14px;
    margin-top:12px;

    border-radius:12px;
    border:none;

    background: rgba(255,255,255,0.15);
    color:white;

    font-size:14px;

    appearance:none; /* 🔥 evita estilos feos del select */
}

/* 🔥 FIX DROPDOWN */
select option{
    background:#111;
    color:white;
}

/* BOTON */
button{
    width:100%;
    padding:14px;
    margin-top:15px;

    border-radius:12px;
    border:none;

    background:white;
    color:black;

    font-weight:600;
    cursor:pointer;

    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

/* RESULTADO */
#resultado{
    margin-top:20px;
    text-align:center;
}

/* BADGE */
.badge{
    text-align:center;
    margin-bottom:15px;
    font-size:12px;
    color:#00ffcc;
}
</style>
</head>

<body>

<div class="card">

    <div class="badge">✔ Diagnóstico gratis • ✔ Garantía real</div>

    <h2>Cotizá tu iPhone</h2>

    <input id="nombreCliente" placeholder="Tu nombre">
    <input id="telefonoCliente" placeholder="Tu WhatsApp">

    <!-- MODELO -->
    <select id="modelo">
        <option value="">Modelo</option>
        <option>iPhone 7</option>
        <option>iPhone 8</option>
        <option>iPhone X</option>
        <option>iPhone XR</option>
        <option>iPhone 11</option>
        <option>iPhone 12</option>
        <option>iPhone 13</option>
        <option>iPhone 14</option>
    </select>

    <!-- REPARACION -->
    <select id="reparacion" onchange="cambiarOpciones()">
        <option value="">Reparación</option>
        <option>Pantalla</option>
        <option>Batería</option>
        <option>Cámara</option>
        <option>Pin de carga</option>
    </select>

    <!-- DINAMICO -->
    <div id="opcionesExtra"></div>

    <button onclick="cotizar()">Cotizar ahora</button>

    <div id="resultado"></div>

</div>

<script src="js/app.js"></script>

</body>
</html>
